<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" fill="transparent" />
  
  <g stroke="#00ff41" stroke-width="6" fill="none" stroke-linecap="square" stroke-linejoin="miter" filter="url(#neonGlow)">
    <polyline points="14,16 32,32 14,48" />
    
    <line x1="38" y1="48" x2="54" y2="48" />
  </g>

  <rect x="8" y="26" width="10" height="2" fill="#00ff41" opacity="0.85" filter="url(#neonGlow)" />
  <rect x="42" y="38" width="6" height="3" fill="#00ff41" opacity="0.7" filter="url(#neonGlow)" />
  <rect x="30" y="14" width="4" height="2" fill="#00ff41" opacity="0.9" />
</svg>
